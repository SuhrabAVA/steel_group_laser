name: steel_group_laser
description: Steel Group Laser desktop file explorer powered by Flutter + Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  supabase_flutter: ^2.10.3
  flutter_dotenv: ^5.2.1
  desktop_drop: ^0.6.0
  file_picker: ^10.3.2
  file_selector: ^1.0.3
  path: ^1.9.1
  mime: ^2.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.3.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
